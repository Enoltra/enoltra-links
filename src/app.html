<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

		<!-- =====================================================
		     CONSENT MODE V2 — must run BEFORE any tracking tags
		     Sets all signals to 'denied' by default until user
		     accepts via the Silktide cookie banner below.
		===================================================== -->
		<script>
			window.dataLayer = window.dataLayer || [];
			function gtag() { dataLayer.push(arguments); }
			// Default deny all — Silktide will fire granted signals after consent
			gtag('consent', 'default', {
				ad_storage: 'denied',
				ad_user_data: 'denied',
				ad_personalization: 'denied',
				analytics_storage: 'denied',
				wait_for_update: 500
			});
			// Also default-deny Meta's consent signals
			window._fbConsentGranted = false;
		</script>

		<!-- =====================================================
		     META PIXEL — ID: 908360642829623
		     Fires PageView on every page load.
		     Lead, CompleteRegistration events fired per-page.
		     Pixel only activates once consent is granted.
		===================================================== -->
		<script>
			!function(f,b,e,v,n,t,s)
			{if(f.fbq)return;n=f.fbq=function(){n.callMethod?
				n.callMethod.apply(n,arguments):n.queue.push(arguments)};
				if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
				n.queue=[];t=b.createElement(e);t.async=!0;
				t.src=v;s=b.getElementsByTagName(e)[0];
				s.parentNode.insertBefore(t,s)}(window, document,'script',
				'https://connect.facebook.net/en_US/fbevents.js');

			// Grant consent for Meta when user accepts advertising cookies
			window.addEventListener('stcm_consent_update', function(e) {
				var consent = e.detail || {};
				if (consent.advertising) {
					fbq('consent', 'grant');
					window._fbConsentGranted = true;
					// Fire PageView after consent granted if not already fired
					if (!window._fbPageViewFired) {
						fbq('track', 'PageView');
						window._fbPageViewFired = true;
					}
					// Also update Google Consent Mode signals
					gtag('consent', 'update', {
						ad_storage: 'granted',
						ad_user_data: 'granted',
						ad_personalization: 'granted'
					});
				} else {
					fbq('consent', 'revoke');
					window._fbConsentGranted = false;
				}
				if (consent.analytics) {
					gtag('consent', 'update', { analytics_storage: 'granted' });
				}
			});

			fbq('init', '908360642829623');
			// PageView fires immediately — Meta handles consent internally via fbq('consent')
			// If user already consented previously (cookie exists), fire right away
			window._fbPageViewFired = false;
		</script>
		<noscript>
			<img height="1" width="1" style="display:none"
				src="https://www.facebook.com/tr?id=908360642829623&ev=PageView&noscript=1"/>
		</noscript>

		<!-- =====================================================
		     SILKTIDE CONSENT MANAGER — Open Source, Consent Mode v2
		     Styled to match Enoltra brand: #2B2FC6 bg, #A374F5 purple,
		     #C1FF72 accent, Darker Grotesque / Dela Gothic One fonts.
		===================================================== -->
		<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
		<link rel="stylesheet" id="silktide-consent-manager-css"
			href="https://cdn.jsdelivr.net/gh/silktide/consent-manager@v2.0.1/silktide-consent-manager.css"
			integrity="sha384-EdMq+R+YOnsbelo08wPenoTlnxbAyxI11NMIxzugx/qAsbh64KcOkqxYqq6pfvO/"
			crossorigin="anonymous">
		<script src="https://cdn.jsdelivr.net/gh/silktide/consent-manager@v2.0.1/silktide-consent-manager.js"
			integrity="sha384-5Pt34uiIbCsvfiiZXoLi4HRf/YBXjr9c8e+gYeVo9smUaInNHYVtc8NZ8wUnXJIq"
			crossorigin="anonymous"></script>

		<!-- Brand-matched overrides for Silktide cookie banner (v2 CSS var API) -->
		<style>
			#stcm-wrapper {
				--fontFamily: 'Darker Grotesque', sans-serif;
				--primaryColor: #C1FF72;
				--backgroundColor: #A374F5;
				--textColor: #FFFFFF;
				--boxShadow: -5px 5px 10px 0px #00000022, 0px 0px 50px 0px #0000002a;
				--backdropBackgroundColor: #2B2FC677;
				--backdropBackgroundBlur: 6px;
				--iconColor: #A374F5;
				--iconBackgroundColor: #C1FF72;
			}

			#stcm-wrapper h1,
			#stcm-wrapper h2,
			#stcm-wrapper h3 {
				font-family: 'Dela Gothic One', sans-serif;
				font-weight: 400;
				text-transform: none;
			}

			/* ── Pill shape for action buttons only — close button is excluded ── */
			#stcm-wrapper button:not([class*="close"]):not([aria-label="Close"]):not([aria-label="close"]),
			#stcm-wrapper .stcm-button {
				font-family: 'Dela Gothic One', sans-serif !important;
				font-weight: 400 !important;
				font-size: 0.75rem !important;
				padding: 10px 22px !important;
				border-radius: 999px !important;
				border: 1px solid #FFFFFF !important;
				background-color: transparent !important;
				color: #FFFFFF !important;
				transition: all 0.2s !important;
				white-space: nowrap !important;
				box-shadow: none !important;
			}

			#stcm-wrapper button:not([class*="close"]):not([aria-label="Close"]):not([aria-label="close"]):hover,
			#stcm-wrapper .stcm-button:hover {
				background-color: #FFFFFF !important;
				color: #A374F5 !important;
			}

			/* ── Accept all: green pill ── */
			#stcm-wrapper .stcm-button--accept-all,
			#stcm-wrapper button.stcm-button--accept-all {
				background-color: #C1FF72 !important;
				border-color: #C1FF72 !important;
				color: #2B2FC6 !important;
				border-radius: 999px !important;
			}

			#stcm-wrapper .stcm-button--accept-all:hover,
			#stcm-wrapper button.stcm-button--accept-all:hover {
				background-color: transparent !important;
				color: #C1FF72 !important;
				border-color: #C1FF72 !important;
			}

			/* ── Close (X) button — fully standalone, no pill inheritance ── */
			#stcm-wrapper .stcm-close,
			#stcm-wrapper .stcm-button--close,
			#stcm-wrapper button.stcm-close,
			#stcm-wrapper button[class*="close"],
			#stcm-wrapper button[aria-label="Close"],
			#stcm-wrapper button[aria-label="close"] {
				all: unset !important;
				display: inline-flex !important;
				align-items: center !important;
				justify-content: center !important;
				width: 32px !important;
				height: 32px !important;
				cursor: pointer !important;
				color: #FFFFFF !important;
				opacity: 0.75 !important;
				background: transparent !important;
				border: none !important;
				border-radius: 0 !important;
				padding: 0 !important;
				box-shadow: none !important;
				transition: opacity 0.2s !important;
			}

			#stcm-wrapper .stcm-close:hover,
			#stcm-wrapper .stcm-button--close:hover,
			#stcm-wrapper button.stcm-close:hover,
			#stcm-wrapper button[class*="close"]:hover,
			#stcm-wrapper button[aria-label="Close"]:hover,
			#stcm-wrapper button[aria-label="close"]:hover {
				opacity: 1 !important;
				background: transparent !important;
			}

			/* ── Make the Preferences control look like a text link, not a pill button ── */
			#stcm-wrapper .stcm-linklike-preferences {
				background: transparent !important;
				border: 0 !important;
				padding: 0 !important;
				margin-left: 6px !important;
				min-width: 0 !important;
				width: auto !important;
				height: auto !important;
				box-shadow: none !important;
				font-family: 'Darker Grotesque', sans-serif !important;
				font-size: 1rem !important;
				font-weight: 600 !important;
				color: rgba(255,255,255,0.82) !important;
				text-decoration: underline !important;
				text-underline-offset: 3px !important;
				text-decoration-thickness: 1px !important;
				letter-spacing: 0.01em !important;
				white-space: nowrap !important;
			}

			#stcm-wrapper .stcm-linklike-preferences:hover {
				color: #FFFFFF !important;
				background: transparent !important;
				border: 0 !important;
			}

			/* ── Hide Silktide branding: credit link, preferences link, S icon (all known selectors) ── */
			#stcm-wrapper .stcm-preferences-link,
			#stcm-wrapper .stcm-credit-link,
			#stcm-wrapper .stcm-icon,
			#stcm-wrapper [class*="stcm-icon"],
			#stcm-wrapper [class*="silktide"],
			#stcm-wrapper .stcm-prompt__icon,
			#stcm-wrapper .stcm-banner__icon,
			#stcm-wrapper [class*="__icon"],
			#stcm-wrapper img[src*="silktide"],
			#stcm-wrapper svg[class*="icon"],
			#stcm-icon,
			.stcm-icon {
				display: none !important;
			}

			/* ── Nuclear option: hide any anchor linking to silktide.com ── */
			a[href*="silktide"] {
				display: none !important;
				visibility: hidden !important;
				opacity: 0 !important;
				pointer-events: none !important;
				width: 0 !important;
				height: 0 !important;
				overflow: hidden !important;
			}
		</style>

		<script>
			(function () {
				function removeSilktideBranding() {
					document.querySelectorAll('a[href*="silktide"]').forEach(function (el) {
						var root = el.closest('[id*="stcm"], [class*="stcm"], [id*="silktide"], [class*="silktide"]');
						(root || el).remove();
					});

					document.querySelectorAll(
						'#stcm-icon, [class*="stcm-icon"], [id*="stcm-icon"], ' +
						'[class*="stcm-prompt__icon"], [class*="stcm-banner__icon"], ' +
						'[class*="__icon"][id*="stcm"], ' +
						'img[src*="silktide"], svg[class*="icon"]'
					).forEach(function (el) {
						el.remove();
					});
				}

				document.addEventListener('DOMContentLoaded', removeSilktideBranding);

				document.addEventListener('DOMContentLoaded', function () {
					var observer = new MutationObserver(function () {
						removeSilktideBranding();
					});

					observer.observe(document.body, { childList: true, subtree: true });
					setTimeout(function () { observer.disconnect(); }, 10000);
				});
			})();
		</script>

		<!-- ── Downgrade Preferences button to subtle text link after render ── -->
		<script>
			(function () {
				function softenPreferencesButton() {
					var wrapper = document.querySelector('#stcm-wrapper');
					if (!wrapper) return;

					wrapper.querySelectorAll('button, a').forEach(function (el) {
						var label = (el.textContent || '').trim().toLowerCase();
						if (label === 'preferences' || label === 'cookie settings') {
							el.classList.add('stcm-linklike-preferences');
						}
					});
				}

				document.addEventListener('DOMContentLoaded', softenPreferencesButton);

				document.addEventListener('DOMContentLoaded', function () {
					var observer = new MutationObserver(function () {
						softenPreferencesButton();
					});

					observer.observe(document.body, { childList: true, subtree: true });
					setTimeout(function () { observer.disconnect(); }, 10000);
				});
			})();
		</script>

		<script>
			window.silktideConsentManager.init({
				prompt: { position: 'bottomCenter' },
				icon: { position: 'bottomLeft', show: false },
				backdrop: { show: false },
				text: {
					prompt: {
						description: '<p>I use a few cookies to keep this site running smoothly, understand what content people actually enjoy, and support occasional marketing. You can accept everything, reject anything non-essential, or adjust your settings.</p>',
						acceptAllButtonText: 'Accept all',
						rejectNonEssentialButtonText: 'Reject non-essential',
						preferencesButtonText: 'Cookie settings'
					},
					preferences: {
						title: 'Choose what works for you',
						description: '<p>I like to keep this simple. Essential cookies keep the site working properly, analytics help me understand what people are into, and marketing cookies support advertising and audience insights. Pick whatever feels right for you.</p>',
						saveButtonText: 'Save settings',
						creditLinkText: '',
					}
				},
				consentTypes: [
					{
						id: 'essential',
						label: 'Essential',
						description: '<p>Needed for the site to work properly and securely.</p>',
						required: true
					},
					{
						id: 'analytics',
						label: 'Analytics',
						description: '<p>Helps me understand visits, pages, and what content gets the most interest.</p>',
						defaultValue: false,
						gtag: 'analytics_storage'
					},
					{
						id: 'advertising',
						label: 'Marketing',
						description: '<p>Used for marketing and advertising purposes, including measuring campaigns and reaching people who may be interested in my work.</p>',
						defaultValue: false,
						gtag: ['ad_storage', 'ad_user_data', 'ad_personalization']
					}
				]
			});

			// On load: if consent was previously saved, fire PageView immediately
			document.addEventListener('DOMContentLoaded', function() {
				var saved = window.silktideConsentManager && window.silktideConsentManager.getConsent
					? window.silktideConsentManager.getConsent()
					: null;
				if (saved && saved.advertising && !window._fbPageViewFired) {
					try { fbq('track', 'PageView'); window._fbPageViewFired = true; } catch(e) {}
				}
			});
		</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
